name: Update Feeds

on:
  schedule:
    - cron: '0 0 * * *'  # Run once a day to start the feed update loop
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-feeds-and-upload:
    runs-on: self-hosted-primary
    timeout-minutes: 1200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Start Feed Update Loop
        env:  # Pass the secret as an environment variable
          ANIMESCHEDULE_TOKEN: ${{secrets.ANIMESCHEDULE_TOKEN}}
        shell: bash
        run: |
          end_time=$(( $(date +%s) + 71100 )) # Run for 19h 45m, allows 15 minute buffer before timeout.
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          while [ $(date +%s) -lt $end_time ]; do
            echo "Checking for newly released episodes"
          
            # Clean up any leftover rebase state
            if [ -d "$(git rev-parse --git-dir)/rebase-merge" ] || [ -d "$(git rev-parse --git-dir)/rebase-apply" ]; then
              echo "Cleaning up stuck rebase..."
              git rebase --abort
            fi
          
            # Pull latest changes
            git pull --rebase
          
            # Run the feed update script
            timeout 120s npm run update-feeds
          
            # Stage, commit, and push any JSON changes
            git add './raw/last-updated.json' './readable/last-updated-readable.json' './raw/dub-episode-feed.json' './readable/dub-episode-feed-readable.json' './raw/sub-episode-feed.json' './readable/sub-episode-feed-readable.json' './raw/hentai-episode-feed.json' './readable/hentai-episode-feed-readable.json'

            title="Updated Episode(s)"
            if [ -f changes.txt ] && [ -s changes.txt ]; then
              contains_dub=$(grep -q "(Dub)" changes.txt && echo true || echo false)
              contains_sub=$(grep -q "(Sub)" changes.txt && echo true || echo false)
              contains_hentai=$(grep -q "(Hentai)" changes.txt && echo true || echo false)
              contains_added=$(grep -q "Added" changes.txt && echo true || echo false)
              contains_removed=$(grep -q "Removed" changes.txt && echo true || echo false)
              contains_delayed=$(grep -qi "delayed" changes.txt && echo true || echo false)
              contains_missing=$(grep -q "Missing" changes.txt && echo true || echo false)
              contains_modified=$(grep -q "Modified" changes.txt && echo true || echo false)

              # Build type prefix (Dub/Sub/Hentai)
              type_prefix=""
              if [ "$contains_dub" == "true" ] && [ "$contains_sub" == "true" ] && [ "$contains_hentai" == "true" ]; then
                type_prefix="(Dub/Sub/Hentai)"
              elif [ "$contains_dub" == "true" ] && [ "$contains_sub" == "true" ]; then
                type_prefix="(Dub/Sub)"
              elif [ "$contains_dub" == "true" ] && [ "$contains_hentai" == "true" ]; then
                type_prefix="(Dub/Hentai)"
              elif [ "$contains_sub" == "true" ] && [ "$contains_hentai" == "true" ]; then
                type_prefix="(Sub/Hentai)"
              elif [ "$contains_dub" == "true" ]; then
                type_prefix="(Dub)"
              elif [ "$contains_sub" == "true" ]; then
                type_prefix="(Sub)"
              elif [ "$contains_hentai" == "true" ]; then
                type_prefix="(Hentai)"
              fi

              # Build action suffix from all present actions
              actions=""
              [ "$contains_added" == "true" ] && actions="${actions:+$actions/}Added"
              [ "$contains_missing" == "true" ] && actions="${actions:+$actions/}Missing"
              [ "$contains_removed" == "true" ] && actions="${actions:+$actions/}Removed"
              [ "$contains_delayed" == "true" ] && actions="${actions:+$actions/}Delayed"
              [ "$contains_modified" == "true" ] && actions="${actions:+$actions/}Modified"

              [ -n "$actions" ] && title="$actions Episode(s)"
              [ -n "$type_prefix" ] && title="$type_prefix $title"

              git commit -m "$title" -m "$(cat changes.txt)" || true
            else
              git commit -m "$title" || true
            fi

            git pull --rebase && git push || echo "Push failed, will retry on next run"

            echo "Sleeping for 30 seconds..."
            sleep 30
          done